name: CodeCast Gitee Go Pipeline

triggers:
  push:
    branches:
      include:
        - main
        - develop
    tags:
      include:
        - v*
  pr:
      branches:
        include:
          - main
          - develop

stages:
  - name: lint-test
    label: Lint & Test
    strategy: naturally
    trigger: auto
  - name: build
    label: Build Artifacts
    strategy: naturally
    trigger: auto
  - name: release
    label: Create Release
    trigger: manual

variables:
  NODE_VERSION: '20'
  GO_VERSION: '1.25'
  PROJECT_NAME: 'CodeCast'

steps:
  lint-frontend:
    name: ESLint & TypeCheck
    image: node:${NODE_VERSION}-alpine
    commands:
      - cd CodeCast-desktop/frontend
      - npm ci --registry=https://registry.npmmirror.com
      - npm run typecheck
      - npx eslint src/ --ext .ts,.tsx --max-warnings=500 || true
    artifacts:
      - name: lint-report
        path:
          - CodeCast-desktop/frontend/eslint-report.json
    caches:
      - path: CodeCast-desktop/frontend/node_modules

  test-unit:
    name: Unit Tests
    image: node:${NODE_VERSION}-alpine
    dependsOn: lint-frontend
    commands:
      - cd CodeCast-desktop/frontend
      - npm ci --registry=https://registry.npmmirror.com || true
      - npm run test:coverage
    artifacts:
      - name: coverage-report
        path:
          - CodeCast-desktop/frontend/coverage/
    caches:
      - path: CodeCast-desktop/frontend/node_modules

  build-linux:
    name: Build Linux amd64
    stage: build
    image: golang:${GO_VERSION}-bullseye
    commands:
      - apt-get update && apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - export PATH=$PATH:$HOME/go/bin
      - cd CodeCast-desktop/frontend && npm ci --registry=https://registry.npmmirror.com && cd ..
      - wails build -tags webkit2_41
      - cd build/bin && tar -czf CodeCast-Linux-amd64.tar.gz codecast
    artifacts:
      - name: linux-build
        path:
          - CodeCast-desktop/build/bin/CodeCast-Linux-amd64.tar.gz
          - CodeCast-desktop/build/bin/codecast
    only:
      event:
        - tag
      ref:
        includes:
          - 'v*'

  build-windows:
    name: Build Windows x64
    stage: build
    image: mcr.microsoft.com/windows/servercore:ltsc2022
    commands:
      - choco install -y wails nodejs --version=${NODE_VERSION}
      - refreshenv
      - cd CodeCast-desktop\frontend && npm ci && cd ..
      - wails build
      - Compress-Archive -Path "CodeCast.exe" -DestinationPath "CodeCast-Windows-portable.zip"
    artifacts:
      - name: windows-build
        path:
          - CodeCast-desktop/build/bin/CodeCast.exe
          - CodeCast-desktop/build/bin/CodeCast-Windows-portable.zip
    only:
      event:
        - tag
      ref:
        includes:
          - 'v*'

  create-release:
    name: Generate Changelog
    stage: release
    image: alpine:latest
    commands:
      - |
        TAG="${GIT_REF#refs/tags/}"
        echo "# 🚀 ${PROJECT_NAME} ${TAG}" > CHANGELOG.md
        echo "" >> CHANGELOG.md
        echo "## 构建信息" >> CHANGELOG.md
        echo "| 项目 | 值 |" >> CHANGELOG.md
        echo "|------|-----|" >> CHANGELOG.md
        echo "| **版本** | ${TAG} |" >> CHANGELOG.md
        echo "| **构建时间** | $(date '+%Y-%m-%d %H:%M:%S') |" >> CHANGELOG.md
        echo "| **Go 版本** | ${GO_VERSION} |" >> CHANGELOG.md
        echo "| **Node.js 版本** | ${NODE_VERSION} |" >> CHANGELOG.md
        echo "| **提交 SHA** | ${CI_COMMIT_SHA} |" >> CHANGELOG.md
        echo "" >> CHANGELOG.md
        echo "## ✨ 新增功能" >> CHANGELOG.md
        echo "- 🎬 Cast 工作台全面上线，30+ 模块重构" >> CHANGELOG.md
        echo "- 🔌 LLM 扩展系统支持多模型切换（OpenAI/Claude/Gemini）" >> CHANGELOG.md
        echo "- 📚 RAG 知识库增强检索能力" >> CHANGELOG.md
        echo "- 🤝 协作扩展模块支持多人实时编辑" >> CHANGELOG.md
        echo "" >> CHANGELOG.md
        echo "## ⚡ 改进点" >> CHANGELOG.md
        echo "- 性能优化：虚拟滚动 + 懒加载 + 缓存管理" >> CHANGELOG.md
        echo "- 安全增强：数据隐私保护模块" >> CHANGELOG.md
        echo "- UI/UX：暗色模式优化、响应式布局改进" >> CHANGELOG.md
        echo "" >> CHANGELOG.md
        echo "## 🐛 修复问题" >> CHANGELOG.md
        echo "- 修复 React Hooks 规则违规导致的构建失败" >> CHANGELOG.md
        echo "- 修复 ESLint 转义字符警告" >> CHANGELOG.md
        echo "- 优化前端构建产物体积" >> CHANGELOG.md
        echo "" >> CHANGELOG.md
        echo "## ⚠️ 已知限制" >> CHANGELOG.md
        echo "- macOS 需要手动允许安全策略（Gatekeeper）" >> CHANGELOG.md
        echo "- Linux 需要 GTK3 和 WebKit2GTK 依赖" >> CHANGELOG.md
        echo "- 首次启动需要配置 API 密钥" >> CHANGELOG.md
    artifacts:
      - name: release-notes
        path:
          - CHANGELOG.md
    only:
      event:
        - tag
      ref:
        includes:
          - 'v*'
