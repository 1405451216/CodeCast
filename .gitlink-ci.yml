version: "2"
codecast:
  git_clone:
    type: git_clone:1.0.0-rc1
    inputs:
      remote_url: https://gitlink.org.cn/yangchen123/CodeCast.git
      ref: main
      username: yangchen123
      password: 92dc59a18f7475e68c13c18df27be260741e5878

  build_windows:
    type: shell:1.0.1
    inputs:
      script: |
        echo "=== Building CodeCast for Windows ==="
        cd CodeCast-desktop/frontend
        npm ci
        cd ..
        wails build -clean
        echo "=== Creating portable package ==="
        cd build/bin
        Compress-Archive -Path "CodeCast.exe" -DestinationPath "CodeCast-Windows-amd64-portable.zip"
        ls -la
    dependsOn:
      - git_clone

  build_macos_intel:
    type: shell:1.0.1
    inputs:
      script: |
        echo "=== Building CodeCast for macOS Intel (amd64) ==="
        export PATH=$PATH:/usr/local/go/bin:$HOME/go/bin
        go install github.com/wailsapp/wails/v2/cmd/wails@latest
        cd CodeCast-desktop/frontend && npm ci && cd ..
        GOARCH=amd64 CGO_ENABLED=1 wails build -platform darwin/amd64 -clean
        cd build/bin
        APP_NAME=$(find . -maxdepth 1 -name "*.app" -type d | head -1)
        if [ -n "$APP_NAME" ] && [ -d "$APP_NAME" ]; then
          mkdir -p dmg-staging
          cp -R "$APP_NAME" dmg-staging/CodeCast.app
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "CodeCast Intel" -srcfolder dmg-staging -ov -format UDZO "CodeCast-macOS-intel.dmg"
          rm -rf dmg-staging
          echo "✅ macOS Intel DMG created successfully"
        fi
        ls -la
    dependsOn:
      - git_clone

  build_macos_arm64:
    type: shell:1.0.1
    inputs:
      script: |
        echo "=== Building CodeCast for macOS Apple Silicon (arm64) ==="
        export PATH=$PATH:/opt/homebrew/bin:$HOME/go/bin
        go install github.com/wailsapp/wails/v2/cmd/wails@latest
        cd CodeCast-desktop/frontend && npm ci && cd ..
        GOARCH=arm64 CGO_ENABLED=1 wails build -platform darwin/arm64 -clean
        cd build/bin
        APP_NAME=$(find . -maxdepth 1 -name "*.app" -type d | head -1)
        if [ -n "$APP_NAME" ] && [ -d "$APP_NAME" ]; then
          mkdir -p dmg-staging
          cp -R "$APP_NAME" dmg-staging/CodeCast.app
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "CodeCast Apple Silicon" -srcfolder dmg-staging -ov -format UDZO "CodeCast-macOS-arm64.dmg"
          rm -rf dmg-staging
          echo "✅ macOS ARM64 DMG created successfully"
        fi
        ls -la
    dependsOn:
      - git_clone

  create_universal:
    type: shell:1.0.1
    inputs:
      script: |
        echo "=== Creating Universal Binary ==="
        INTEL_APP=$(find CodeCast-desktop/build/bin -path "*intel*.app" -type d | head -1 || find CodeCast-desktop/build/bin -name "*.app" -type d | head -1)
        ARM64_APP=$(find CodeCast-desktop/build/bin -path "*arm64*.app" -type d | head -1 || find CodeCast-desktop/build/bin -name "*.app" -type d | tail -1)

        if [ -n "$INTEL_APP" ] && [ -n "$ARM64_APP" ]; then
          cp -R "$ARM64_APP" ./CodeCast-universal.app
          INTEL_BIN="$INTEL_APP/Contents/MacOS/CodeCast"
          ARM64_BIN="$ARM64_APP/Contents/MacOS/CodeCast"

          if [ -f "$INTEL_BIN" ] && [ -f "$ARM64_BIN" ]; then
            lipo -create "$INTEL_BIN" "$ARM64_BIN" -output ./CodeCast-universal.app/Contents/MacOS/CodeCast
            echo "✅ Universal binary created"
            file ./CodeCast-universal.app/Contents/MacOS/CodeCast

            mkdir -p dmg-staging
            cp -R CodeCast-universal.app dmg-staging/
            ln -s /Applications dmg-staging/Applications
            hdiutil create -volname "CodeCast Universal" -srcfolder dmg-staging -ov -format UDZO "CodeCast-macOS-universal.dmg"
            rm -rf dmg-staging
            echo "✅ Universal DMG created"
          else
            echo "⚠️ Binary files not found"
          fi
        else
          echo "⚠️ Could not find both app bundles"
        fi
    dependsOn:
      - build_macos_intel
      - build_macos_arm64

  release_notes:
    type: shell:1.0.1
    inputs:
      script: |
        echo "## 🚀 CodeCast Multi-Platform Release" > RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
        echo "### 📦 Build Artifacts" >> RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
        echo "| Platform | Architecture | File |" >> RELEASE_NOTES.md
        echo "|----------|---------------|------|" >> RELEASE_NOTES.md
        echo "| Windows | amd64 | \`CodeCast.exe\` |" >> RELEASE_NOTES.md
        echo "| Windows | amd64 | \`CodeCast-Windows-portable.zip\` |" >> RELEASE_NOTES.md
        echo "| macOS | Intel (amd64) | \`CodeCast-macOS-intel.dmg\` |" >> RELEASE_NOTES.md
        echo "| macOS | Apple Silicon (arm64) | \`CodeCast-macOS-arm64.dmg\` |" >> RELEASE_NOTES.md
        echo "| macOS | Universal | \`CodeCast-macos-universal.dmg\` |" >> RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
        echo "### ✨ Features" >> RELEASE_NOTES.md
        echo "- 🎬 Cast Workspace - AI-powered development environment" >> RELEASE_NOTES.md
        echo "- 🔌 Multi-model LLM support" >> RELEASE_NOTES.md
        echo "- 📚 RAG knowledge base enhancement" >> RELEASE_NOTES.md
        echo "- 🛡️ Data privacy protection module" >> RELEASE_NOTES.md
        echo "- ⚡ Virtual scrolling + lazy loading optimization" >> RELEASE_NOTES.md
        cat RELEASE_NOTES.md
    dependsOn:
      - build_windows
      - create_universal
