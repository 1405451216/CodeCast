name: Build & Publish (Windows)

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      gitee_sync:
        description: '同步到 Gitee'
        required: false
        default: 'true'
        type: boolean
      version:
        description: '版本号 (如 v1.0.0)'
        required: false
        type: string

permissions:
  contents: write

env:
  GITEE_REPO: ${{ vars.GITEE_REPO || 'CodeCast/code-cast' }}
  GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}

jobs:
  build-windows:
    runs-on: windows-latest
    name: Build Windows (amd64)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: CodeCast-desktop/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: CodeCast-desktop/frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: CodeCast-desktop/frontend
        run: npm ci

      - name: Build for Windows
        working-directory: CodeCast-desktop
        run: wails build

      - name: Package portable zip
        shell: pwsh
        working-directory: CodeCast-desktop/build/bin
        run: |
          Compress-Archive -Path "CodeCast.exe" -DestinationPath "CodeCast-Windows-portable.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CodeCast-Windows
          path: |
            CodeCast-desktop/build/bin/CodeCast.exe
            CodeCast-desktop/build/bin/CodeCast-Windows-portable.zip
          retention-days: 30
          if-no-files-found: warn

  publish-github-release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: CodeCast-Windows
          path: dist

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist/*

  publish-gitee-release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/v') || github.event.inputs.gitee_sync == 'true'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: CodeCast-Windows
          path: dist

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS.txt

      - name: Determine version tag
        id: version
        run: |
          if [ "${{ github.ref }}" = "refs/tags/"* ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install upload dependencies
        working-directory: .github/scripts
        run: npm init -y && npm install axios form-data

      - name: Sync code to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: ${{ vars.GITEE_OWNER || 'CodeCast' }}
          GITEE_REPO_NAME: ${{ vars.GITEE_REPO_NAME || 'code-cast' }}
        run: |
          echo "🔄 同步代码到 Gitee..."
          git clone --bare https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git repo.git
          cd repo.git
          git push --mirror https://${GITEE_OWNER}:${GITEE_TOKEN}@gitee.com/${GITEE_OWNER}/${GITEE_REPO_NAME}.git || echo "⚠️ Gitee push failed"
          cd ..
          rm -rf repo.git

      - name: Upload to Gitee Release (Node.js)
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: ${{ vars.GITEE_OWNER || 'CodeCast' }}
          GITEE_REPO_NAME: ${{ vars.GITEE_REPO_NAME || 'code-cast' }}
          TAG: ${{ steps.version.outputs.tag }}
          FILES_DIR: dist
        working-directory: .github/scripts
        run: node gitee-upload.mjs
