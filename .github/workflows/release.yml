name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  call-build-windows:
    name: Trigger Windows Build
    uses: ./.github/workflows/build-windows.yml
    secrets: inherit

  call-build-linux:
    name: Trigger Linux Build
    uses: ./.github/workflows/build-linux.yml
    secrets: inherit

  call-build-macos:
    name: Trigger macOS Build
    uses: ./.github/workflows/build-macos.yml
    secrets: inherit

  publish-release:
    name: Create GitHub Release
    needs: [call-build-windows, call-build-linux, call-build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist

      - name: Prepare release assets
        run: |
          cd dist
          find . -type f \( -name "*.exe" -o -name "*.zip" -o -name "*.tar.gz" -o -name "*.dmg" -o -name "*.AppImage" \) -exec mv {} . \;
          sha256sum * > SHA256SUMS.txt
          ls -la

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if [ -n "${PREV_TAG}" ]; then
            echo "## Changes since ${PREV_TAG}" > CHANGELOG.md
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" >> CHANGELOG.md 2>/dev/null || true
          else
            echo "## ${TAG}" > CHANGELOG.md
            git log --pretty=format:"- %s (%h)" -20 >> CHANGELOG.md 2>/dev/null || true
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          generate_release_notes: false
          body_path: dist/CHANGELOG.md
          files: dist/*
          token: ${{ secrets.GITHUB_TOKEN }}

  notify-gitee:
    name: Notify Gitee
    needs: publish-release
    if: always() && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install upload deps
        working-directory: .github/scripts
        run: npm ci

      - name: Determine version tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: ${{ vars.GITEE_OWNER || 'CodeCast' }}
          GITEE_REPO_NAME: ${{ vars.GITEE_REPO_NAME || 'CodeCast' }}
          TAG: ${{ steps.version.outputs.tag }}
          FILES_DIR: ${{ github.workspace }}/dist
        working-directory: .github/scripts
        run: |
          echo "Syncing to Gitee..."
          git clone --bare https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git repo.git 2>/dev/null || true
          cd repo.git 2>/dev/null || true
          git -c credential.helper='!f() { echo "password=${GITEE_TOKEN}"; echo "username=${GITEE_OWNER}"; }; f' push --mirror https://gitee.com/${GITEE_OWNER}/${GITEE_REPO_NAME}.git 2>/dev/null && echo "Code sync succeeded" || echo "Code sync skipped"
          cd ..
          rm -rf repo.git 2>/dev/null || true

      - name: Upload to Gitee Release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: ${{ vars.GITEE_OWNER || 'CodeCast' }}
          GITEE_REPO_NAME: ${{ vars.GITEE_REPO_NAME || 'CodeCast' }}
          TAG: ${{ steps.version.outputs.tag }}
          FILES_DIR: ${{ github.workspace }}/dist
        working-directory: .github/scripts
        run: node gitee-upload.mjs || echo "⚠️ Gitee 发布跳过"
