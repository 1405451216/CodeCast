name: Build macOS

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    strategy:
      matrix:
        platform:
          - arch: amd64
            name: Intel
          - arch: arm64
            name: Apple Silicon

    name: macOS (${{ matrix.platform.name }})

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: CodeCast-desktop/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: CodeCast-desktop/frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install frontend dependencies
        working-directory: CodeCast-desktop/frontend
        run: npm ci

      - name: Build for macOS (${{ matrix.platform.name }})
        working-directory: CodeCast-desktop
        env:
          GOARCH: ${{ matrix.platform.arch }}
          CGO_ENABLED: 1
        run: wails build -platform darwin/${{ matrix.platform.arch }}

      - name: Create DMG (optional)
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: CodeCast-desktop/build/bin
        run: |
          # 使用 hdiutil 创建 DMG（app名称可能是小写 codecast.app）
          APP_NAME=$(find . -maxdepth 1 -name "*.app" -type d | head -1)
          DMG_NAME="CodeCast-macOS-${{ matrix.platform.arch }}.dmg"

          if [ -n "$APP_NAME" ] && [ -d "$APP_NAME" ]; then
            mkdir -p dmg-staging
            cp -R "$APP_NAME" dmg-staging/CodeCast.app
            ln -s /Applications dmg-staging/Applications
            hdiutil create -volname "CodeCast" -srcfolder dmg-staging -ov -format UDZO "$DMG_NAME"
            rm -rf dmg-staging
          else
            echo "Warning: No .app bundle found, skipping DMG creation"
            ls -la
          fi

      - name: List build output
        working-directory: CodeCast-desktop/build/bin
        run: ls -laR

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: CodeCast-macOS-${{ matrix.platform.arch }}
          path: CodeCast-desktop/build/bin/
          if-no-files-found: warn
          retention-days: 30

  # 合并为 Universal Binary（同时支持 Intel 和 Apple Silicon）
  universal-binary:
    needs: build-macos
    runs-on: macos-latest
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/v')
    name: macOS Universal Binary

    steps:
      - name: Download Intel build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: CodeCast-macOS-amd64
          path: intel

      - name: Download Apple Silicon build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: CodeCast-macOS-arm64
          path: arm64

      - name: Create Universal Binary
        run: |
          # 列出下载内容以调试路径
          echo "=== Intel artifact contents ==="
          find intel -name "CodeCast" -type f || true
          echo "=== ARM64 artifact contents ==="
          find arm64 -name "CodeCast" -type f || true

          # 动态查找可执行文件路径（app名称可能是小写 codecast.app）
          INTEL_BIN=$(find intel -path "*/Contents/MacOS/CodeCast" -type f | head -1)
          ARM64_BIN=$(find arm64 -path "*/Contents/MacOS/CodeCast" -type f | head -1)
          ARM64_APP=$(find arm64 -name "*.app" -type d | head -1)

          if [ -n "$INTEL_BIN" ] && [ -n "$ARM64_BIN" ] && [ -n "$ARM64_APP" ]; then
            # 以 arm64 版本为基础
            cp -R "$ARM64_APP" ./CodeCast.app
            # 使用 lipo 合并
            lipo -create "$INTEL_BIN" "$ARM64_BIN" -output ./CodeCast.app/Contents/MacOS/CodeCast
            echo "Universal binary created successfully"
            file ./CodeCast.app/Contents/MacOS/CodeCast
          else
            echo "Error: Could not find architecture binaries"
            echo "INTEL_BIN=$INTEL_BIN"
            echo "ARM64_BIN=$ARM64_BIN"
            echo "ARM64_APP=$ARM64_APP"
            find intel arm64 -type f | head -20
            exit 1
          fi

      - name: Create Universal DMG
        run: |
          DMG_NAME="CodeCast-macOS-universal.dmg"
          mkdir -p dmg-staging
          cp -R CodeCast.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "CodeCast" -srcfolder dmg-staging -ov -format UDZO "$DMG_NAME"
          rm -rf dmg-staging

      - name: Upload Universal Binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: CodeCast-macOS-universal
          path: |
            CodeCast.app
            *.dmg
          retention-days: 30

  # 发布到 GitHub Releases
  release:
    needs: [build-macos, universal-binary]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
