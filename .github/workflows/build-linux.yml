name: Build & Publish (Linux)

on:
  workflow_dispatch:
    inputs:
      gitee_sync:
        description: '同步到 Gitee'
        required: false
        default: 'true'
        type: boolean
      version:
        description: '版本号 (如 v1.0.0)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: Build Linux (amd64)

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: CodeCast-desktop/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: CodeCast-desktop/frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install frontend dependencies
        working-directory: CodeCast-desktop/frontend
        run: npm ci

      - name: Build for Linux
        working-directory: CodeCast-desktop
        run: wails build -tags webkit2_41

      - name: Package tarball
        working-directory: CodeCast-desktop/build/bin
        run: |
          tar -czf CodeCast-Linux-amd64.tar.gz codecast

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: CodeCast-Linux
          path: |
            CodeCast-desktop/build/bin/codecast
            CodeCast-desktop/build/bin/CodeCast-Linux-amd64.tar.gz
          retention-days: 30
          if-no-files-found: warn

  publish-github-release:
    needs: build-linux
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: CodeCast-Linux
          path: dist

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist/*

  publish-gitee-release:
    needs: build-linux
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      startsWith(github.ref, 'refs/tags/v') || github.event.inputs.gitee_sync == 'true'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: CodeCast-Linux
          path: dist

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS.txt

      - name: Determine version tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install upload dependencies
        working-directory: .github/scripts
        run: npm ci

      - name: Upload to Gitee Release (Node.js)
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: ${{ vars.GITEE_OWNER || 'CodeCast' }}
          GITEE_REPO_NAME: ${{ vars.GITEE_REPO_NAME || 'CodeCast' }}
          TAG: ${{ steps.version.outputs.tag }}
          FILES_DIR: ${{ github.workspace }}/dist
        working-directory: .github/scripts
        run: node gitee-upload.mjs
