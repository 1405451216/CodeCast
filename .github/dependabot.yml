version: 2
updates:
  # Go backend dependencies
  - package-ecosystem: gomod
    directory: /CodeCast-desktop
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - go

  # Frontend (npm) dependencies
  - package-ecosystem: npm
    directory: /CodeCast-desktop/frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci-cd
