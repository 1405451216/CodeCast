name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - arch: arm64
            name: Apple-Silicon
          - arch: amd64
            name: Intel
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Install frontend dependencies
        working-directory: CodeCast-desktop/frontend
        run: npm install

      - name: Build macOS ${{ matrix.name }}
        working-directory: CodeCast-desktop
        run: wails build -platform darwin/${{ matrix.arch }} -clean -nosignerdmg

      - name: Package .app as zip
        working-directory: CodeCast-desktop/build/bin
        run: zip -r ../../CodeCast-v3.0.0-macOS-${{ matrix.name }}.zip CodeCast.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodeCast-v3.0.0-macOS-${{ matrix.name }}
          path: CodeCast-desktop/CodeCast-v3.0.0-macOS-${{ matrix.name }}.zip
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Install frontend dependencies
        working-directory: CodeCast-desktop/frontend
        run: npm install

      - name: Build Windows
        working-directory: CodeCast-desktop
        run: wails build -platform windows/amd64 -clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodeCast-v3.0.0-Windows-x64
          path: CodeCast-desktop/build/bin/CodeCast.exe
          retention-days: 30

  release:
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: CodeCast-*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
