name: 🚀 Build & Release CodeCast

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag version (e.g., v3.2.0)'
        required: true
        type: string
      pre_release:
        description: 'Pre-release?'
        required: false
        type: boolean
        default: false

env:
  GO_VERSION: '1.26'
  NODE_VERSION: '20'
  WAILS_VERSION: 'v2'

jobs:
  build-macos:
    name: Build macOS (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            name: Apple-Silicon
          - arch: amd64
            name: Intel
    runs-on: macos-latest
    timeout-minutes: 30
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: 🔧 Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: 📦 Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: CodeCast-desktop/frontend/package-lock.json

      - name: 💾 Cache Wails build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/Library/Caches/wails
            ~/go/pkg/mod
          key: wails-macos-${{ matrix.arch }}-${{ hashFiles('CodeCast-desktop/go.sum') }}
          restore-keys: wails-macos-${{ matrix.arch }}-

      - name: 🛠️ Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: 🔀 Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: 📦 Install frontend dependencies
        working-directory: CodeCast-desktop/frontend
        run: npm ci --prefer-offline

      - name: 🏗️ Build macOS ${{ matrix.name }}
        working-directory: CodeCast-desktop
        run: wails build -platform darwin/${{ matrix.arch }} -clean -nosignerdmg -upx

      - name: 📦 Package as ZIP
        working-directory: CodeCast-desktop/build/bin
        run: |
          zip -r "../../dist/CodeCast-${{ github.event.inputs.tag_name || github.ref_name }}-macOS-${{ matrix.name }}.zip" CodeCast.app
          
          # Generate SHA256 checksums
          cd ../..
          shasum -a 256 dist/CodeCast-*.zip > dist/checksums-macos-${{ matrix.arch }}.txt

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: CodeCast-${{ github.event.inputs.tag_name || github.ref_name }}-macOS-${{ matrix.name }}
          path: |
            CodeCast-desktop/dist/CodeCast-*macOS-${{ matrix.name }}.zip
            CodeCast-desktop/dist/checksums-macos-${{ matrix.arch }}.txt
          retention-days: 30
          if-no-files-found: error

  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    timeout-minutes: 30
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: 🔧 Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: 📦 Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: CodeCast-desktop/frontend/package-lock.json

      - name: 💾 Cache Wails build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~\AppData\Local\wails
            ~\go\pkg\mod
          key: wails-windows-${{ hashFiles('CodeCast-desktop/go.sum') }}
          restore-keys: wails-windows-

      - name: 🛠️ Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: 🔀 Add Go bin to PATH
        run: echo "$(go env GOPATH)\bin" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: 📦 Install frontend dependencies
        working-directory: CodeCast-desktop/frontend
        run: npm ci --prefer-offline

      - name: 🏗️ Build Windows x64
        working-directory: CodeCast-desktop
        run: wails build -platform windows/amd64 -clean -upx

      - name: 📦 Package as ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "CodeCast-desktop\dist" -Force | Out-Null
          Compress-Archive -Path "CodeCast-desktop\build\bin\CodeCast.exe" `
            -DestinationPath "CodeCast-desktop\dist\CodeCast-${{ github.event.inputs.tag_name || github.ref_name }}-Windows-x64.zip" `
            -Force
          
          # Generate SHA256 checksum
          $hash = (Get-FileHash "CodeCast-desktop\dist\CodeCast-*-Windows-x64.zip" -Algorithm SHA256).Hash
          $fileName = (Get-ChildItem "CodeCast-desktop\dist\CodeCast-*-Windows-x64.zip").Name
          "$hash  $fileName" | Out-File -FilePath "CodeCast-desktop\dist\checksums-windows.txt" -Encoding utf8

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: CodeCast-${{ github.event.inputs.tag_name || github.ref_name }}-Windows-x64
          path: |
            CodeCast-desktop/dist/CodeCast-*-Windows-x64.zip
            CodeCast-desktop/dist/checksums-windows.txt
          retention-days: 30
          if-no-files-found: error

  release:
    name: 🎉 Create Release
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          pattern: CodeCast-*
          merge-multiple: true

      - name: 📋 Display downloaded files
        run: find artifacts -type f -name "*.zip" -o -name "*.txt" | sort

      - name: 📝 Generate Release Notes
        id: release_notes
        run: |
          cat > release_notes.md << 'EOF'
          ## 🎉 CodeCast ${{ github.event.inputs.tag_name || github.ref_name }}
          
          ### 📅 发布信息
          - **版本**: `${{ github.event.inputs.tag_name || github.ref_name }}`
          - **日期**: $(date +'%Y-%m-%d')
          - **触发**: ${{ github.actor }}
          
          ---
          
          ## ✨ 主要更新
          
          ### 🔧 问题修复与优化
          - ✅ 修复27个已知问题（12个Warning + 15个Info级别）
          - ⚡ 性能全面优化（React.memo、CSS contain、SW缓存）
          - 🎨 UI/UX体验提升（主题动画、骨架屏、命令历史）
          
          ### 🛠️ 开发工具增强
          - 🧪 Vitest单元测试框架（24个测试用例100%通过）
          - ⌨️ 快捷键系统 + Command Palette（LRU 50条历史）
          - 🌐 国际化i18n基础框架（中英文支持）
          - 📊 Web Vitals性能监控 + 多格式导出
          
          ### 🚀 平台支持
          - ✅ Windows x64 (已构建)
          - ✅ macOS Apple Silicon (arm64) (已构建)
          - ✅ macOS Intel (amd64) (已构建)
          
          ---
          
          ## 📦 下载文件
          
          ### Windows
          | 文件 | 说明 |
          |------|------|
          | `CodeCast-*-Windows-x64.zip` | Windows 64位安装包 |
          
          ### macOS
          | 文件 | 说明 |
          |------|------|
          | `CodeCast-*-macOS-Apple-Silicon.zip` | M1/M2/M3 芯片版本 |
          | `CodeCast-*-macOS-Intel.zip` | Intel 芯片版本 |
          
          > 💡 **如何选择**: 点击左上角苹果图标 → 关于本机 → 查看芯片类型
          
          ---
          
          ## 🔐 校验文件完整性
          
          所有文件均附带SHA256校验值，验证方法：
          
          ```bash
          # Linux/macOS
          sha256sum -c checksums-*.txt
          
          # Windows PowerShell
          Get-FileHash <filename> -Algorithm SHA256
          ```
          
          ---
          
          ## 🚀 安装指南
          
          ### Windows
          1. 下载 `CodeCast-*-Windows-x64.zip`
          2. 解压到任意目录
          3. 双击 `CodeCast.exe` 运行
          
          ### macOS
          1. 下载对应芯片版本的zip文件
          2. 解压得到 `.app` 文件
          3. 拖入 Applications 文件夹
          4. 首次运行需在 系统偏好设置 → 安全性与隐私 中允许
          
          ---
          
          ## 📊 构建统计
          - **构建时间**: $(date +'%Y-%m-%d %H:%M UTC')
          - **Workflow Run**: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          - **Commit**: [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          
          ---
          
          *🤖 由 GitHub Actions 自动构建发布*
          *CodeCast - AI帮你写代码，把想法铸成产物*
          EOF
          
          echo "✅ Release notes generated"

      - name: 🎯 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          name: CodeCast ${{ github.event.inputs.tag_name || github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ github.event.inputs.pre_release || false }}
          files: |
            artifacts/*.zip
            artifacts/*.txt
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📢 Notify Success
        if: success()
        run: |
          echo "✅ Release created successfully!"
          echo "🔗 URL: https://github.com/${{ github.repository }}/releases/tag/${{ github.event.inputs.tag_name || github.ref_name }}"

      - name: ⚠️ Notify Failure
        if: failure()
        run: |
          echo "❌ Release creation failed!"
          echo "🔗 Check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"